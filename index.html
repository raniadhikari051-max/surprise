<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Love Story ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ✨ FLOATING HEARTS BACKGROUND -->
  <div class="heart-bg" id="heartBg"></div>

  <!-- 🎵 MUSIC -->
  <div class="music" onclick="toggleMusic()">🎵</div>
  <audio id="bgm" loop src="romantic.mp3"></audio>

  <!-- 🌙 DAY/NIGHT MODE TOGGLE -->
  <div class="mode-toggle" onclick="toggleMode()">
    <span class="toggle-icon">☀️</span>
  </div>

  <!-- 🧭 NAVIGATION (HIDDEN) -->
  <nav></nav>

  <!-- 🌸 HERO -->
  <div class="hero">
    <h1>Forever & Always</h1>
    <p>Every moment with you is a beautiful dream come true.</p>
    <div class="unique-nav">
      <a href="story.html" class="unique-link">Open Our Story 📖</a>
    </div>
  </div>

  <section>
    <div class="card" style="text-align: center;">
      <h2 style="font-family: 'Playfair Display', serif; margin-bottom: 15px;">Welcome to Our Space</h2>
      <p>This is a small collection of our memories, our story, and the love we share. Explore the pages to see our journey together.</p>
    </div>
  </section>

  <footer>
    Made with love ✨
  </footer>

  <script>
    const music = document.getElementById('bgm');
    function toggleMusic() {
      if (music.paused) music.play();
      else music.pause();
    }

    // ✨ Create floating hearts
    function createHearts() {
      const bg = document.getElementById('heartBg');
      const heartEmojis = ['❤️', '💖', '💕', '🌸', '✨'];
      for (let i = 0; i < 20; i++) {
        const heart = document.createElement('div');
        heart.className = 'floating-heart';
        heart.innerText = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
        heart.style.animationDelay = (Math.random() * 10) + 's';
        heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
        bg.appendChild(heart);
      }
    }
    createHearts();

    // 🌙 Day/Night Mode
    function toggleMode() {
      document.body.classList.toggle('night-mode');
      const icon = document.querySelector('.toggle-icon');
      if (document.body.classList.contains('night-mode')) {
        icon.textContent = '🌙';
        localStorage.setItem('mode', 'night');
      } else {
        icon.textContent = '☀️';
        localStorage.setItem('mode', 'day');
      }
    }

    // Load saved mode
    const savedMode = localStorage.getItem('mode');
    if (savedMode === 'night') {
      document.body.classList.add('night-mode');
      document.querySelector('.toggle-icon').textContent = '🌙';
    }
  </script>

</body>
</html>
