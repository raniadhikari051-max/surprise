<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Message for You - Forever & Always ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ✨ FLOATING HEARTS BACKGROUND -->
  <div class="heart-bg" id="heartBg"></div>

  <!-- 🎵 MUSIC -->
  <div class="music" onclick="toggleMusic()">🎵</div>
  <audio id="bgm" loop src="romantic.mp3"></audio>

  <!-- 🧭 NAVIGATION (HIDDEN) -->
  <nav></nav>

  <div class="hero" style="height: 40vh;">
    <h1>My Message</h1>
    <p>Words from the heart</p>
  </div>

  <section>
    <div class="message-box">
      <div class="cute-character char-panda" style="top: -50px; left: -10px; transform: rotate(-15deg);"></div>
      <div class="cute-character char-cat" style="bottom: -20px; right: -30px; animation-delay: 1s;"></div>
      <div class="heart-sticker">💖</div>
      Forever yours ❤️
    </div>
  </section>

  <section>
    <div class="card">
      <p style="font-family: 'Poppins', sans-serif; line-height: 1.8; text-align: center;">
         To My Love ❤️
               I love you so much. Thank you for coming into my life and making it this much special. 
      </p>
    </div>
    <div class="unique-nav">
      <a href="index.html" class="unique-link">Back to Start ❤️</a>
    </div>
  </section>

  <footer>
    Made with love ✨
  </footer>

  <script>
    const music = document.getElementById('bgm');
    function toggleMusic() {
      if (music.paused) music.play();
      else music.pause();
    }

    // ✨ Create floating hearts
    function createHearts() {
      const bg = document.getElementById('heartBg');
      const heartEmojis = ['❤️', '💖', '💕', '🌸', '✨'];
      for (let i = 0; i < 20; i++) {
        const heart = document.createElement('div');
        heart.className = 'floating-heart';
        heart.innerText = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
        heart.style.animationDelay = (Math.random() * 10) + 's';
        heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
        bg.appendChild(heart);
      }
    }
    createHearts();
  </script>

</body>
</html>
